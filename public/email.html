<!DOCTYPE html>
<html>
<head>
    <title>Email Generator</title>
    <style>
   body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    text-align: center;
    margin-top: 50px;
}

.container {
    background-color: white;
    width: 650px;
    margin: auto;
    padding: 10px 30px 20px 30px ;
    border-radius: 8px;
    box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
}

h2 {
    color: #333;
    margin-bottom: 25px;
}

button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 18px;
    margin: 10px 30px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background-color: #0056b3;
}

.details {
    margin-top: 30px;
    text-align: left;   /* Left align details */
}

.details p {
    font-size: 17px;
    margin: 15px 0;
}

span {
    color: #007bff;
    font-weight: bold;
}
    </style>
</head>
<body>

<div class="container">

    <h2>Email Generator</h2>

    <button onclick="generateIndianNameEmail()">
        Generate Indian Name Email
    </button>

    <button onclick="generateEnglishNameEmail()">
        Generate English Name Email
    </button>

    <div class="details">
        <p>First Name: <span id="firstNameDisplay"></span></p>
        <p>Last Name: <span id="lastNameDisplay"></span></p>
        <p>Email: <span id="generatedEmail"></span></p>
    </div>

</div>
<script>

const englishFirstNames = [

    "Fran","Ana","Teo","Andreas","Georgios",

    "Michalis","Panagiota","Panagiotis","Anna","Ioannis",
    "Christina","Marios","Katerina","Dimitris","Ioanna",
    "Noah","Olivia","Oliver","Amelia","Isla",
    "Arthur","Ava","Muhammad","Ivy","Leo",
    "Freya","Harry","Lily","Oscar","Florence",
    "Archie","Henry","Willow"
];

const englishLastNames = [
    "Fisher","Moore","Jones","Wood","Brown",
    "Little","Meyer","Weber","White","Rossi",
    "Russo","Garcia","Silva","Taylor","Baker",
    "Novak","Murphy","Martin","Miller","Smith"
];

const companies = [
    "Google","Microsoft","Amazon","Apple","Meta",
    "Netflix","Oracle","IBM","Intel","Cisco",
    "Adobe","Salesforce","Accenture","Capgemini",
    "Infosys","TCS","Wipro","HCL","TechMahindra",
    "Cognizant","Deloitte","PwC","EY","KPMG",
    "Zoho","Paytm","Flipkart","PhonePe","Swiggy","Zomato"
];

function generateEmail(firstNames, lastNames) {

    let firstName = firstNames[Math.floor(Math.random() * firstNames.length)];

    let lastName = lastNames[Math.floor(Math.random() * lastNames.length)];

    let company = companies[Math.floor(Math.random() * companies.length)];

    let randomNumber = Math.floor(Math.random() * 1000);

    let email = firstName.toLowerCase() + lastName.toLowerCase() + randomNumber + "@" + company.toLowerCase() + ".com";

    document.getElementById("firstNameDisplay").innerText = firstName;
    document.getElementById("lastNameDisplay").innerText = lastName;
    document.getElementById("generatedEmail").innerText = email;
}

function generateIndianNameEmail() {
    generateEmail(indianFirstNames, indianLastNames);
}

function generateEnglishNameEmail() {
    generateEmail(englishFirstNames, englishLastNames);
}

</script>

</body>
</html>
